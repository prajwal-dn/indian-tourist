<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Nova AI — Your personal JARVIS-like AI assistant with voice, memory and system control.">
  <title>Nova AI — Personal Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #03050d;
      --panel: #070c1a;
      --border: #0d2040;
      --cyan: #00e5ff;
      --blue: #0080ff;
      --purple: #7b2fff;
      --green: #00ff88;
      --red: #ff3860;
      --text: #c8e0ff;
      --dim: #3a5070;
      --glow: 0 0 18px rgba(0, 229, 255, .45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── animated scanlines ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 3px,
          rgba(0, 229, 255, .02) 3px, rgba(0, 229, 255, .02) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── grid background ── */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, .04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .logo-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }

    .logo-ring {
      position: absolute;
      inset: 0;
      border: 2px solid var(--cyan);
      border-radius: 50%;
      animation: spin 6s linear infinite;
      box-shadow: var(--glow);
    }

    .logo-ring::after {
      content: "";
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: var(--cyan);
      border-radius: 50%;
    }

    .logo-inner {
      position: absolute;
      inset: 10px;
      background: radial-gradient(circle, #001020 60%, var(--blue) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: var(--cyan);
      letter-spacing: -1px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .title-block h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      color: var(--cyan);
      text-shadow: var(--glow);
    }

    .title-block .sub {
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 3px;
      margin-top: 2px;
    }

    .status-bar {
      margin-left: auto;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot.idle {
      background: var(--dim);
      animation: none;
    }

    .dot.listening {
      background: var(--red);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.7)
      }
    }

    /* ── STATUS CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-label {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    .card-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--cyan);
    }

    .card-val.green {
      color: var(--green);
    }

    .card-val.purple {
      color: var(--purple);
    }

    /* ── CHAT ── */
    .chat-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }

    .chat-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dim);
    }

    #chatbox {
      height: 360px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chatbox::-webkit-scrollbar {
      width: 4px;
    }

    #chatbox::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp .25s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      border: 1px solid;
    }

    .msg.jarvis .avatar {
      border-color: var(--cyan);
      color: var(--cyan);
      background: #001020;
    }

    .msg.user .avatar {
      border-color: var(--purple);
      color: var(--purple);
      background: #10003a;
    }

    .bubble {
      max-width: 74%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.jarvis .bubble {
      background: #051525;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .msg.user .bubble {
      background: #130a2a;
      border: 1px solid #2a1260;
      color: #c8aaff;
    }

    .intent-tag {
      font-size: 9px;
      color: var(--dim);
      background: #030810;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      margin-top: 5px;
      display: inline-block;
      letter-spacing: 1px;
    }

    .intent-tag.system {
      color: var(--green);
      border-color: rgba(0, 255, 136, .3);
    }

    /* ── THINKING DOTS ── */
    .thinking .bubble {
      color: var(--dim);
    }

    .dots span {
      display: inline-block;
      animation: blink 1s infinite;
    }

    .dots span:nth-child(2) {
      animation-delay: .2s;
    }

    .dots span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .2
      }

      40% {
        opacity: 1
      }
    }

    /* ── INPUT ROW ── */
    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: #050a18;
    }

    #userInput {
      flex: 1;
      background: #020610;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border .2s;
    }

    #userInput:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow);
    }

    #userInput::placeholder {
      color: var(--dim);
    }

    .btn {
      background: none;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      border-radius: 8px;
      padding: 10px 18px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      transition: background .2s, box-shadow .2s;
    }

    .btn:hover {
      background: rgba(0, 229, 255, .12);
      box-shadow: var(--glow);
    }

    .btn.mic {
      border-color: var(--purple);
      color: var(--purple);
    }

    .btn.mic:hover {
      background: rgba(123, 47, 255, .12);
    }

    .btn.mic.active {
      background: rgba(255, 56, 96, .15);
      border-color: var(--red);
      color: var(--red);
      animation: micPulse 1s infinite;
    }

    @keyframes micPulse {

      0%,
      100% {
        box-shadow: none
      }

      50% {
        box-shadow: 0 0 16px rgba(255, 56, 96, .5)
      }
    }

    /* ── QUICK COMMANDS ── */
    .quick-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 14px;
    }

    .quick-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--dim);
      margin-bottom: 10px;
    }

    .quick-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .qbtn {
      background: #030810;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .qbtn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    /* ── MEMORY LOG ── */
    .mem-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
    }

    .mem-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #memList {
      max-height: 200px;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mem-item {
      background: #030810;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
    }

    .mem-item .mq {
      color: var(--purple);
      margin-bottom: 2px;
    }

    .mem-item .ma {
      color: var(--dim);
    }

    #historySection {
      display: none;
      flex-direction: column;
      gap: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <div class="logo-wrap">
        <div class="logo-ring"></div>
        <div class="logo-inner">J</div>
      </div>
      <div class="title-block">
        <h1>JARVIS</h1>
      </div>
      <div class="status-bar">
        <div class="pill">
          <div class="dot" id="apiDot"></div><span id="apiLabel">CONNECTING…</span>
        </div>
        <div class="pill">
          <div class="dot idle" id="micDot"></div><span id="micLabel">MIC IDLE</span>
        </div>
        <button class="pill" onclick="toggleHistory()" style="cursor:pointer; border-color:var(--cyan); color:var(--cyan);">
          <span>📊 HISTORY</span>
        </button>
        <button class="pill" onclick="clearMemory()" style="cursor:pointer; border-color:var(--red); color:var(--red);">
          <span>⚠ RESET</span>
        </button>
      </div>
    </header>

    <!-- STATUS CARDS -->
    <div class="cards">
      <div class="card">
        <div class="card-label">MEMORIES</div>
        <div class="card-val" id="memCount">–</div>
      </div>
      <div class="card">
        <div class="card-label">COMMANDS RUN</div>
        <div class="card-val green" id="cmdCount">–</div>
      </div>
      <div class="card">
        <div class="card-label">PLATFORM</div>
        <div class="card-val purple" id="osLabel">–</div>
      </div>
      <div class="card">
        <div class="card-label">STATUS</div>
        <div class="card-val" id="statusLabel">–</div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-wrap">
      <div class="chat-header">CONVERSATION LOG</div>
      <div id="chatbox"></div>
      <div class="input-row">
        <input id="userInput" placeholder="Ask anything or give a command…" autocomplete="off">
        <button class="btn mic" id="micBtn" onclick="toggleMic()">🎤 MIC</button>
        <button class="btn" onclick="sendMessage()">SEND ↵</button>
      </div>
    </div>



    <!-- HISTORY SECTION (HIDDEN BY DEFAULT) -->
    <div id="historySection">
      <div class="card" style="border-color:var(--cyan);">
        <div class="card-label">ML MEMORY LOG</div>
        <div id="memList" style="max-height:250px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>

  </div>

  <script>
    // Auto-detect: use /api proxy on Netlify, localhost for local dev
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const API = IS_LOCAL ? "http://localhost:5000" : "/api";
    let micActive = false;
    let recognition = null;



    function getClientOS() {
      const ua = navigator.userAgent;
      if (ua.indexOf("Win") !== -1) return "WINDOWS";
      if (ua.indexOf("Android") !== -1) return "ANDROID";
      if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) return "IOS";
      if (ua.indexOf("Mac") !== -1) return "MACOS";
      return "LINUX";
    }

    // ── Status polling ──────────────────────────────────────────────
    async function pollStatus() {
      try {
        const r = await fetch(`${API}/status`);
        const d = await r.json();
        document.getElementById("memCount").textContent = d.memory_size;
        document.getElementById("cmdCount").textContent = d.commands_run;
        
        // Use client-side detection for OS label
        document.getElementById("osLabel").textContent = getClientOS();
        
        document.getElementById("statusLabel").textContent = "ONLINE";
        document.getElementById("apiDot").className = "dot";
        document.getElementById("apiLabel").textContent = "API ONLINE";
      } catch {
        document.getElementById("apiDot").className = "dot idle";
        document.getElementById("apiLabel").textContent = "BACKEND OFFLINE";
        document.getElementById("statusLabel").textContent = "OFFLINE";
      }
    }
    setInterval(pollStatus, 4000);
    pollStatus();

    // ── Memory log ──────────────────────────────────────────────────
    function toggleHistory() {
      const s = document.getElementById("historySection");
      const isVisible = s.style.display === "flex";
      s.style.display = isVisible ? "none" : "flex";
      if(!isVisible) loadMemory();
    }

    async function loadMemory() {
      try {
        const r = await fetch(`${API}/memory`);
        const d = await r.json();
        const list = document.getElementById("memList");
        list.innerHTML = "";
        [...d.qa_pairs].reverse().forEach(p => {
          const el = document.createElement("div");
          el.className = "mem-item";
          el.style.marginBottom = "8px";
          el.innerHTML = `<div class="mq">Q › ${esc(p.q)}</div><div class="ma">A › ${esc(p.a)}</div>`;
          list.appendChild(el);
        });
      } catch { }
    }
    setInterval(loadMemory, 8000);
    loadMemory();

    // ── Chat helpers ────────────────────────────────────────────────
    function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;"); }

    function appendMsg(role, text, intent) {
      const box = document.getElementById("chatbox");
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      const icon = role === "jarvis" ? "J" : "U";
      let tag = "";
      if (intent) {
        const cls = intent === "system_command" ? "intent-tag system" : "intent-tag";
        tag = `<div class="${cls}">${intent.toUpperCase()}</div>`;
      }
      div.innerHTML = `
    <div class="avatar">${icon}</div>
    <div><div class="bubble">${esc(text)}</div>${tag}</div>
  `;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function addThinking() {
      const box = document.getElementById("chatbox");
      const div = document.createElement("div");
      div.className = "msg jarvis thinking";
      div.id = "thinking";
      div.innerHTML = `<div class="avatar">J</div>
    <div class="bubble"><span class="dots"><span>●</span><span>●</span><span>●</span></span></div>`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // ── Text to Speech ── Browser Web Speech API ──
    let voiceEnabled = true;

    function speak(text) {
      if (!voiceEnabled) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      
      // Tweaked for a more "Human" cadence
      utter.rate = 0.95; 
      utter.pitch = 1.0; 
      utter.volume = 1.0;

      const voices = window.speechSynthesis.getVoices();
      
      // PRIORITIZE "Natural" or "Neural" voices
      const preferred = [
        "Natural", "Neural", "Google UK English Male", "Google US English",
        "Microsoft Ryan Online (Natural)", "Microsoft George Online (Natural)",
        "Google UK English Female", "en-GB", "en-US"
      ];

      let chosen = null;
      for (const p of preferred) {
        chosen = voices.find(v => v.name.includes(p) || v.lang.includes(p));
        if (chosen) break;
      }

      if (chosen) utter.voice = chosen;
      window.speechSynthesis.speak(utter);
    }

    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

    // ── Send message ────────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const query = input.value.trim();
      if (!query) return;
      input.value = "";

      appendMsg("user", query);
      addThinking();

      try {
        const r = await fetch(`${API}/ask`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ 
            question: query,
            client_os: getClientOS(),
            local_time: new Date().toLocaleTimeString(),
            local_date: new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
          })
        });
        const d = await r.json();
        document.getElementById("thinking")?.remove();
        const response = d.response || d.answer || d.error;
        appendMsg("jarvis", response, d.intent || (d.is_cmd ? 'system_command' : null));
        
        // AUTO-OPEN LINKS (if Jarvis provides one)
        const urlMatch = response.match(/https?:\/\/[^\s]+/);
        if (urlMatch) {
            setTimeout(() => {
                window.open(urlMatch[0], '_blank');
            }, 1500);
        }

        speak(response);
        loadMemory();
      } catch {
        document.getElementById("thinking")?.remove();
        appendMsg("jarvis", "⚠ Cannot reach backend. Make sure assistant.py is running.", null);
        speak("Cannot reach backend. Make sure assistant dot py is running.");
      }
    }

    document.getElementById("userInput").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    // ── Web Speech API mic ───────────────────────────────────────────
    function toggleMic() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert("Browser speech recognition not supported. Use Chrome.");
        return;
      }
      if (micActive) {
        recognition && recognition.stop();
        return;
      }
      recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.onstart = () => {
        micActive = true;
        document.getElementById("micBtn").classList.add("active");
        document.getElementById("micBtn").textContent = "🔴 STOP";
        document.getElementById("micDot").className = "dot listening";
        document.getElementById("micLabel").textContent = "LISTENING";
      };
      recognition.onresult = e => {
        const text = e.results[0][0].transcript;
        document.getElementById("userInput").value = text;
        sendMessage();
      };
      recognition.onend = () => {
        setTimeout(() => { micActive = false; }, 1000);
        document.getElementById("micBtn").classList.remove("active");
        document.getElementById("micBtn").textContent = "🎤 MIC";
        document.getElementById("micDot").className = "dot idle";
        document.getElementById("micLabel").textContent = "MIC IDLE";
      };
      recognition.start();
    }



    async function clearMemory() {
      if(!confirm("Are you sure you want to wipe my memory, sir?")) return;
      try {
        await fetch(`${API}/memory/clear`, { method: "POST" });
        document.getElementById("chatbox").innerHTML = "";
        appendMsg("nova", "Memory wiped. I am ready to start fresh, sir.");
        pollStatus();
        loadMemory();
      } catch {
        alert("Failed to reach backend.");
      }
    }


  </script>
</body>

</html>
