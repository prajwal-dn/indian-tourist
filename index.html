<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Jarvis AI — A sophisticated, high-performance digital companion.">
  <title>Jarvis AI | Sophisticated Intelligence</title>
  
  <!-- Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Google DeepMind / Gemini Inspired Palette */
      --bg: #040816;
      --surface: rgba(13, 17, 34, 0.7);
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      
      --accent-primary: #4285F4; /* Google Blue */
      --accent-secondary: #9334E6; /* DeepMind Purple */
      --accent-tertiary: #00F2FE; /* Tech Cyan */
      
      --text-main: #F0F4F8;
      --text-dim: #94A3B8;
      
      --shadow-premium: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --font-main: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: var(--font-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(66, 133, 244, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(147, 52, 230, 0.1) 0%, transparent 40%);
    }

    /* ── Subtle Background Animation ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.04;
      pointer-events: none;
      z-index: 100;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1100px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--glass-border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ai-orb {
      position: relative;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(66, 133, 244, 0.4);
      overflow: hidden;
    }

    .ai-orb::after {
      content: "";
      position: absolute;
      inset: 2px;
      background: var(--bg);
      border-radius: 50%;
      z-index: 1;
    }

    .ai-orb-inner {
      position: absolute;
      inset: 8px;
      background: linear-gradient(45deg, var(--accent-primary), var(--accent-tertiary));
      border-radius: 50%;
      z-index: 2;
      animation: pulseOrb 4s ease-in-out infinite;
    }

    @keyframes pulseOrb {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.2); opacity: 1; filter: blur(2px); }
    }

    .brand-text h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #FFF, #94A3B8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-text p {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    /* ── GLASS CARD UTILITY ── */
    .glass-panel {
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: var(--shadow-premium);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .stat-card {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-card .label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .stat-card .value {
      font-size: 28px;
      font-weight: 600;
      color: #FFF;
    }

    .stat-card .indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10B981; /* Green */
      box-shadow: 0 0 10px #10B981;
    }

    .status-dot.offline {
      background: #EF4444;
      box-shadow: 0 0 10px #EF4444;
    }

    /* ── MAIN CHAT AREA ── */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 650px;
      overflow: hidden;
    }

    #chatbox {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #chatbox::-webkit-scrollbar {
      width: 6px;
    }
    #chatbox::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .message {
      display: flex;
      gap: 16px;
      max-width: 85%;
      animation: msgReveal 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards;
    }

    @keyframes msgReveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .message.jarvis .avatar-icon {
      background: linear-gradient(135deg, rgba(66, 133, 244, 0.2), rgba(147, 52, 230, 0.2));
      border-color: rgba(66, 133, 244, 0.3);
    }

    .bubble {
      padding: 16px 20px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.6;
      position: relative;
    }

    .message.jarvis .bubble {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #FFF;
      border-bottom-right-radius: 4px;
      box-shadow: 0 10px 20px -5px rgba(66, 133, 244, 0.3);
    }

    .intent-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
      color: var(--text-dim);
      opacity: 0.7;
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 24px 32px;
      background: rgba(255, 255, 255, 0.02);
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    #userInput {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px 24px;
      color: #FFF;
      font-family: var(--font-main);
      font-size: 15px;
      outline: none;
      transition: all 0.3s ease;
    }

    #userInput:focus {
      border-color: var(--accent-primary);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(66, 133, 244, 0.1);
    }

    .action-btn {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: #FFF;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .action-btn:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(66, 133, 244, 0.3);
    }

    .action-btn.mic-btn.active {
      background: #EF4444;
      border-color: #EF4444;
      animation: micPulse 1.5s infinite;
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }

    /* ── THINKING ANIMATION ── */
    .thinking-dots {
      display: flex;
      gap: 6px;
      padding: 4px 0;
    }

    .thinking-dots span {
      width: 6px;
      height: 6px;
      background: var(--accent-primary);
      border-radius: 50%;
      animation: thinkBounce 1.4s infinite ease-in-out both;
    }

    .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
    .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes thinkBounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* ── HISTORY / MEMORY DRAWER ── */
    #historySection {
      display: none;
      padding: 32px;
      margin-top: 10px;
    }

    .memory-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .memory-content {
      flex: 1;
    }

    .memory-q { color: var(--accent-tertiary); font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    .memory-a { color: var(--text-dim); font-size: 13px; }

    .delete-btn {
      background: none;
      border: none;
      color: #EF4444;
      cursor: pointer;
      padding: 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .delete-btn:hover { opacity: 1; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .container { padding: 20px 12px; gap: 20px; }
      header { flex-direction: column; gap: 20px; align-items: flex-start; }
      .controls { width: 100%; }
      .chat-container { height: 500px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .message { max-width: 95%; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <div class="brand">
        <div class="ai-orb">
          <div class="ai-orb-inner"></div>
        </div>
        <div class="brand-text">
          <h1>JARVIS</h1>
          <p>Sophisticated Intelligence</p>
        </div>
      </div>
      
      <div class="controls">
        <button class="action-btn" onclick="toggleHistory()" title="Memory History">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
        </button>
        <div class="stat-card glass-panel" style="padding: 10px 20px; border-radius: 16px; display: flex; flex-direction: row; align-items: center; gap: 12px;">
          <div class="status-dot" id="apiDot"></div>
          <span id="apiLabel" style="font-size: 11px; font-weight: 700; letter-spacing: 1px;">CONNECTING</span>
        </div>
      </div>
    </header>

    <!-- STATS GRID -->
    <div class="stats-grid">
      <div class="stat-card glass-panel">
        <div class="label">Cognitive Memories</div>
        <div class="value" id="memCount">0</div>
      </div>
      <div class="stat-card glass-panel">
        <div class="label">Neural Operations</div>
        <div class="value" id="cmdCount">0</div>
      </div>
      <div class="stat-card glass-panel">
        <div class="label">System Environment</div>
        <div class="value" id="osLabel">DETECTING</div>
      </div>
    </div>

    <!-- MAIN CHAT -->
    <main class="chat-container glass-panel">
      <div id="chatbox">
        <!-- Messages will appear here -->
      </div>
      
      <div class="input-bar">
        <button class="action-btn mic-btn" id="micBtn" onclick="toggleMic()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        
        <div class="input-wrapper">
          <input id="userInput" placeholder="Synthesize a request..." autocomplete="off">
        </div>
        
        <button class="action-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </main>

    <!-- HISTORY DRAWER (Hidden) -->
    <div id="historySection" class="glass-panel">
      <h3 style="margin-bottom: 20px; font-weight: 600; letter-spacing: -0.5px;">Long-Term Memory Log</h3>
      <div id="memList"></div>
    </div>

  </div>

  <script>
    // Configuration
    const IS_LOCAL = location.hostname === "localhost" || location.hostname === "127.0.0.1";
    const API = IS_LOCAL ? "http://localhost:5000" : "https://aiassis.up.railway.app";
    
    let micActive = false;
    let recognition = null;
    let voiceEnabled = true;

    // Detect Platform
    function getClientOS() {
      const ua = navigator.userAgent;
      if (ua.indexOf("Win") !== -1) return "WINDOWS";
      if (ua.indexOf("Android") !== -1) return "ANDROID";
      if (ua.indexOf("iPhone") !== -1 || ua.indexOf("iPad") !== -1) return "IOS";
      if (ua.indexOf("Mac") !== -1) return "MACOS";
      return "LINUX";
    }
    document.getElementById("osLabel").textContent = getClientOS();

    // ── Status Polling ──────────────────────────────────────────────
    async function pollStatus() {
      try {
        const r = await fetch(`${API}/status`);
        const d = await r.json();
        document.getElementById("memCount").textContent = d.memory_size;
        document.getElementById("cmdCount").textContent = d.commands_run;
        document.getElementById("apiDot").classList.remove("offline");
        document.getElementById("apiLabel").textContent = "SYNAPSE ACTIVE";
      } catch {
        document.getElementById("apiDot").classList.add("offline");
        document.getElementById("apiLabel").textContent = "NEURAL LINK SEVERED";
      }
    }
    setInterval(pollStatus, 5000);
    pollStatus();

    // ── Message Handlers ───────────────────────────────────────────
    function esc(s) { 
      return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
    }

    function appendMsg(role, text, intent) {
      const box = document.getElementById("chatbox");
      const div = document.createElement("div");
      div.className = `message ${role}`;
      
      const avatar = role === "jarvis" ? 
        `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>` : 
        `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

      let intentTag = intent ? `<div class="intent-label">${intent.replace(/_/g, ' ')}</div>` : "";

      div.innerHTML = `
        <div class="avatar-icon">${avatar}</div>
        <div class="bubble-container">
          <div class="bubble">${esc(text)}</div>
          ${intentTag}
        </div>
      `;
      
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
      return div;
    }

    function addThinking() {
      const box = document.getElementById("chatbox");
      const div = document.createElement("div");
      div.className = "message jarvis thinking";
      div.id = "thinking";
      div.innerHTML = `
        <div class="avatar-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div class="bubble"><div class="thinking-dots"><span></span><span></span><span></span></div></div>
      `;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // ── Voice Logic ───────────────────────────────────────────────
    function speak(text) {
      if (!voiceEnabled) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1.0;
      utter.pitch = 1.0;
      const voices = window.speechSynthesis.getVoices();
      const chosen = voices.find(v => v.name.includes("Google UK English Male") || v.lang.includes("en-GB"));
      if (chosen) utter.voice = chosen;
      window.speechSynthesis.speak(utter);
    }

    function toggleMic() {
      if (!recognition) {
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!window.SpeechRecognition) return alert("Speech API not supported.");
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.onresult = (e) => {
          document.getElementById("userInput").value = e.results[0][0].transcript;
          sendMessage();
        };
        recognition.onend = () => {
          micActive = false;
          document.getElementById("micBtn").classList.remove("active");
        };
      }

      if (micActive) {
        recognition.stop();
      } else {
        recognition.start();
        micActive = true;
        document.getElementById("micBtn").classList.add("active");
      }
    }

    // ── Send Logic ────────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const query = input.value.trim();
      if (!query) return;
      input.value = "";

      appendMsg("user", query);
      addThinking();

      try {
        const r = await fetch(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: query, os: getClientOS() })
        });
        const d = await r.json();
        
        document.getElementById("thinking").remove();
        appendMsg("jarvis", d.response, d.intent);
        speak(d.response);

        if (d.intent === "system_command" && d.action_url) {
          setTimeout(() => window.open(d.action_url, '_blank'), 1500);
        }
        pollStatus();
      } catch {
        if(document.getElementById("thinking")) document.getElementById("thinking").remove();
        appendMsg("jarvis", "Neural link failed. Ensure the backend is active.");
      }
    }

    document.getElementById("userInput").onkeydown = (e) => { if(e.key === 'Enter') sendMessage(); };

    // ── History Logic ──────────────────────────────────────────────
    function toggleHistory() {
      const s = document.getElementById("historySection");
      const isVisible = s.style.display === "block";
      s.style.display = isVisible ? "none" : "block";
      if (!isVisible) loadMemory();
    }

    async function loadMemory() {
      try {
        const r = await fetch(`${API}/memory`);
        const d = await r.json();
        const list = document.getElementById("memList");
        list.innerHTML = "";
        d.qa_pairs.reverse().forEach((p, idx) => {
          const el = document.createElement("div");
          el.className = "memory-item";
          el.innerHTML = `
            <div class="memory-content">
              <div class="memory-q">QUERY » ${esc(p.q)}</div>
              <div class="memory-a">RESPONSE » ${esc(p.a)}</div>
            </div>
            <button class="delete-btn" onclick="deleteMemory(${d.qa_pairs.length - 1 - idx})">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          `;
          list.appendChild(el);
        });
      } catch { }
    }

    async function deleteMemory(idx) {
      if (!confirm("Erase synapse?")) return;
      await fetch(`${API}/memory/delete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ index: idx })
      });
      loadMemory();
      pollStatus();
    }
  </script>
</body>

</html>
